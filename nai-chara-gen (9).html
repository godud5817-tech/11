upil:["slit pupils","dilated pupils","heart-shaped pupils","star-shaped pupils","diamond-shaped pupils","flower-shaped pupils","cross-shaped pupils","symbol-shaped pupils","mismatched pupils","horizontal pupils","constricted pupils","ringed eyes","no pupils"],sclera:["black sclera","red sclera","yellow sclera","blue sclera","colored sclera"],eyebrow:["thick eyebrows","thin eyebrows","long eyebrows","short eyebrows","V-shaped eyebrows","furrowed brow","raised eyebrow","asymmetrical eyebrows","eyebrows visible through hair","shaved eyebrows","white eyebrows","colored eyebrows","expressive eyebrows"],bodyFemale:[["flat chest",5],["small breasts",5],["medium breasts",5],["large breasts",5],["huge breasts",3],["gigantic breasts",1]],bodyMale:["toned","muscular","muscular male","abs","six-pack","slim","skinny","lanky","broad shoulders","narrow shoulders","Dominant","burly","lean","athletic"],bodyGeneral:["slender"],skinMark:["freckles","mole","mole under eye","mole under mouth","mole on breast","mole on cheek","beauty mark","scar","scar on face","scar across eye"]};

const EXPR={positiveSmile:["happy","excited","smile","light smile","grin","stifled laugh","forced smile","sad smile","laughing","giggling","snickering"],smugConfidence:["smug","smirk","doyagao","seductive smile","evil smile","evil grin","naughty face"],angerDispleasure:["angry","annoyed","glaring","scowl","anger vein","clenched teeth","frustrated","disgust","disdain","unamused","pout","sulking","envy","clenched hands"],sadnessMelancholy:["sad","depressed","despair","frown","gloom","lonely","disappointed","guilt","tears","sobbing","crying","tearing up"],surpriseFearPanic:["surprised","scared","horrified","panicking","worried","traumatized","screaming","flustered","embarrassed","blush","full-face blush","color drain","turn pale","nervous","trembling","sweatdrop"],complexMisc:["serious","determined","thinking","pensive","confused","bored","sleepy","exhausted","pain","wince","struggling","grimace","expressionless","crazy","drunk","sigh","facepalm","yawning","whistling","afterglow","torogao","kubrick stare","rolling eyes","shaded face","shadow over eyes","twitching"],mouthFace:["open mouth","closed mouth","parted lips","round mouth","wavy mouth","pouty lips","pursed lips","drooling","heavy breathing","nosebleed","wink","raised inner eyebrows","x mouth"],emoji:[":3",";3","x3","0w0","uwu","o3o",">3<",":p",";p",":q",":9",";q","^q^","^p^","^_^",":D",";D","XD","c:",":>","\\(^o^)/","T_T","D:",":c",":<",";<","3:",">:(",">\\_<",">o<",">:)","o_o","0_0","._.","@_@","+_+","+_-","=_=",":|",":/",":T"]};

const EX={face:["fang","fangs","vampire fangs","tongue out","visible tongue","lipstick","red lipstick","black lipstick","lip gloss","blush stickers","nose blush","ear blush","dimples","double eyelid","sharp face","round face","heart-shaped face","small nose","button nose","goatee","stubble","beard","mustache","facial hair","biting lip","clenched jaw","crooked mouth","teeth","sharp teeth","braces","retainer","gap teeth","saliva"],ears:["pointy ears","long pointy ears","elf ears","animal ears","cat ears","fox ears","dog ears","wolf ears","rabbit ears","mouse ears","bear ears","raccoon ears","deer ears","horse ears","fake animal ears","ear piercing","multiple ear piercings","industrial piercing","earrings","stud earrings","hoop earrings","drop earrings"],nonHuman:["horns","small horns","large horns","curved horns","demon horns","dragon horns","goat horns","ram horns","antlers","tail","demon tail","cat tail","fox tail","dog tail","wolf tail","dragon tail","fluffy tail","long tail","multiple tails","wings","angel wings","demon wings","bat wings","feathered wings","dragon wings","fairy wings","small wings","large wings","mechanical wings","halo","dark halo","broken halo","extra arms","extra eyes","third eye","scales","skin markings","claws","sharp nails","paws","digitigrade legs","tusks"],piercings:["nose piercing","septum piercing","lip piercing","labret piercing","lip ring","tongue piercing","eyebrow piercing","navel piercing","bridge piercing"],bodyExtra:["thin","petite","long legs","slim legs","thick thighs","muscular legs","narrow waist","thick waist","long torso","short torso","collarbone","prominent collarbone","wide hips","narrow hips","hourglass figure","pear-shaped body","plump","chubby","curvy","sagging breasts","perky breasts","tall","short","tall female","tall male","stocky"],skinColor:["colored skin","blue skin","red skin","green skin","yellow skin","purple skin","grey skin"],skinExtra:["tattoo","facial tattoo","arm tattoo","back tattoo","facepaint","body paint","sweat","wet skin","shiny skin","oily skin","sunburn"],faceAccessory:["food on face","bandage on face","bandaid on face","sunglasses","monocle","eyepatch","blindfold","mask","surgical mask","gas mask","face mask"],makeup:["eyeliner","eyeshadow","mascara","makeup","heavy makeup"],hairRemoved:["shiny hair","glossy hair","wet hair","damp hair","no bangs","no eyebrows","silky hair","thin hair","flowing hair"]};

const exprSet=new Set(Object.values(EXPR).flat());
const exclSet=new Set(Object.values(EX).flat());
const allExtra=new Set([...exprSet,...exclSet]);

// ═══ HELPERS ═══
const rr=a=>a[Math.floor(Math.random()*a.length)],mb=p=>Math.random()<p;
const pN=(a,mn,mx)=>{const n=mn+Math.floor(Math.random()*(mx-mn+1));return[...a].sort(()=>Math.random()-.5).slice(0,Math.min(n,a.length))};
function rW(a){const tw=a.reduce((s,x)=>s+x[1],0);let rl=Math.random()*tw;for(const[t,w]of a){rl-=w;if(rl<=0)return t}return a[a.length-1][0]}
const skS=new Set(P.skin.map(x=>x[0])),hcS=new Set(P.hairColor.map(x=>x[0])),hlS=new Set(P.hairLength.map(x=>x[0])),ecS=new Set(P.eyeColor.map(x=>x[0])),eBS=new Set(P.eyeBase),bfS=new Set(P.bodyFemale.map(x=>x[0]));
const ahS=new Set(P.ahoge),puS=new Set(P.pupil),scS=new Set(P.sclera),ebS=new Set(P.eyebrow);
function sP(cs,fn){const p=[...pins].filter(t=>cs.has(t));if(p.length>0)return[];const v=fn();return v?[v]:[]}
function oSP(cs,ch,fn){const p=[...pins].filter(t=>cs.has(t));if(p.length>0)return[];if(Math.random()<ch){const v=fn();return v?[v]:[];}return[]}

// ═══ STATE ═══
let gM="random",hist=[],oP=null,pins=new Set(),dis=new Set();
let exprOp=false,exprK=null,exclOp=false,exclK=null;
function on(k){return!dis.has(k)}

// ═══ GENERATE ═══
// Conflict tables
const HC_MAX={"buzz cut":0,"crew cut":0,"flattop":0,"pixie cut":1,"faux hawk":1,"small afro":1,"bowl cut":2,"asymmetrical bob":2,"afro":2,"bob cut":3,"inverted bob":3,"okappa":3};
const HC_MIN={};
const HL_ORD=["very short hair","short hair","medium hair","long hair","very long hair","absurdly long hair"];
const HC_NO_ARR=new Set(["buzz cut","crew cut","flattop"]);
const TEX_GR=[new Set(["straight hair","curly hair","wavy hair"]),new Set(["curly hair","spiked hair","spiky hair"])];
const EYE_CF=[new Set(["closed eyes","wide eyes","narrowed eyes","half-closed eyes","staring eyes","squinting"]),new Set(["wide eyes","sleepy eyes"]),new Set(["big eyes","small eyes"])];
function fltCf(picked,pool,groups){let bl=new Set();for(const g of groups){if(g.has(picked))g.forEach(t=>{if(t!==picked)bl.add(t)})}return pool.filter(x=>{const t=Array.isArray(x)?x[0]:x;return!bl.has(t)})}

function generate(){
  const tags=[],g=gM==="random"?rr(P.gender):gM;tags.push(g);const isB=g==="boy";
  const pNB=pins.has("no bangs"),pNE=pins.has("no eyebrows");
  const pCS=EX.skinColor.some(t=>pins.has(t));
  if(on("genderModBoy")&&on("genderModGirl")){
    if(isB){const hM=Math.random()<.38,hB=Math.random()<.25;if(hM&&hB){if(mb(.2)){tags.push("mature male");tags.push("bishounen")}else tags.push("mature male")}else if(hM){tags.push("mature male");if(mb(.08))tags.push("aged up")}else if(hB)tags.push("bishounen");else if(mb(.15))tags.push(Math.random()<.25?"androgynous":"otoko no ko")}
    else{const f=Math.random();if(f<.25){tags.push("mature female");if(mb(.08))tags.push("aged up")}else if(f<.45)tags.push("bishoujo");else if(mb(.15))tags.push(rr(["androgynous","tomboy"]))}
  }
  if(on("skin")&&!pCS)sP(skS,()=>rW(P.skin)).forEach(t=>tags.push(t));
  if(on("hairColor"))sP(hcS,()=>rW(P.hairColor)).forEach(t=>tags.push(t));
  const pHL=[...pins].filter(t=>hlS.has(t));

  const hcSet=new Set(P.haircut);const pHCpin=[...pins].filter(t=>hcSet.has(t));
  let pHC=pHCpin.length>0?pHCpin[0]:null;
  if(!pHC&&on("haircut")&&mb(.3)){let hcP=[...P.haircut];if(pHLI>=0)hcP=hcP.filter(hc=>{const mx=HC_MAX[hc];if(mx!==undefined&&pHLI>mx)return false;return true});if(hcP.length>0){pHC=rr(hcP);tags.push(pHC)}}
  if(on("hairLength"))sP(hlS,()=>{let hl=P.hairLength.map(([t,b,g])=>[t,isB?b:g]);if(pHC){const mx=HC_MAX[pHC],mn=HC_MIN[pHC];if(mx!==undefined)hl=hl.filter(([t])=>HL_ORD.indexOf(t)<=mx);if(mn!==undefined)hl=hl.filter(([t])=>HL_ORD.indexOf(t)>=mn);if(hl.length===0)hl=P.hairLength.map(([t,b,g])=>[t,isB?b:g])}return rW(hl)}).forEach(t=>tags.push(t));

  if(on("eyeBase"))sP(eBS,()=>rr(P.eyeBase)).forEach(t=>tags.push(t));
  if(!isB&&on("bodyFemale"))sP(bfS,()=>rW(P.bodyFemale)).forEach(t=>tags.push(t));
  if(on("hairTexture")){const t1=rr(P.hairTexture);tags.push(t1);if(mb(.5)){const p2=fltCf(t1,P.hairTexture,TEX_GR).filter(x=>x!==t1);if(p2.length>0)tags.push(rr(p2))}}
  if(on("hairArrange")&&mb(.4)){if(!(pHC&&HC_NO_ARR.has(pHC)))tags.push(rr(P.hairArrange))}
  if(on("bangs")&&!pNB){tags.push(rr(P.bangs));if(mb(.08)){const b2=rr(P.bangs);if(!tags.includes(b2))tags.push(b2)}}
  if(on("hairExtra")&&mb(.5))pN(P.hairExtra,1,2).forEach(t=>tags.push(t));
  if(on("ahoge"))oSP(ahS,.12,()=>rr(P.ahoge)).forEach(t=>tags.push(t));
  let hCE=pins.has("closed eyes");
  if(on("eyeSub")&&mb(.55)){const e1=rW(P.eyeSub);tags.push(e1);if(e1==="closed eyes")hCE=true;if(mb(.3)){const p2=fltCf(e1,P.eyeSub,EYE_CF).filter(x=>{const t=Array.isArray(x)?x[0]:x;return t!==e1});if(p2.length>0){const e2=rW(p2);if(!tags.includes(e2)){tags.push(e2);if(e2==="closed eyes")hCE=true}}}}
  if(on("eyeDetail")&&mb(.4))pN(P.eyeDetail,1,2).forEach(t=>tags.push(t));
  if(on("pupil")&&!hCE)oSP(puS,.05,()=>rr(P.pupil)).forEach(t=>tags.push(t));
  if(on("sclera"))oSP(scS,.01,()=>rr(P.sclera)).forEach(t=>tags.push(t));
  if(on("eyebrow")&&!pNE)oSP(ebS,.15,()=>rr(P.eyebrow)).forEach(t=>tags.push(t));

  const extras=[...pExpr,...pExcl];
  if(extras.length>0)return[...all,...extras].join(", ");
  return all.join(", ");
}

function cT(){let n=0;Object.values(P).forEach(a=>{if(Array.isArray(a))n+=a.length});return n}
function cO(o){let n=0;Object.values(o).forEach(a=>n+=a.length);return n}

// ═══ UI FUNCTIONS ═══
function sG(g){gM=g;document.querySelectorAll('.gb').forEach(b=>b.classList.toggle('a',b.dataset.g===g))}
function gen(){const p=generate();document.getElementById('out').textContent=p;const b=document.getElementById('cB');b.className='cb';b.textContent='Copy';hist.unshift({t:p,ts:Date.now()});if(hist.length>50)hist.length=50;rH();rP()}
function cR(){navigator.clipboard.writeText(document.getElementById('out').textContent).then(()=>{const b=document.getElementById('cB');b.className='cb ok';b.textContent='✓ Copied';setTimeout(()=>{b.className='cb';b.textContent='Copy'},1400)})}
function tP(tag){if(pins.has(tag))pins.delete(tag);else pins.add(tag);rP();rPG();rAllExtra()}
function clP(){pins.clear();rP();rPG();rAllExtra()}
function tD(k){if(dis.has(k))dis.delete(k);else dis.add(k);rPG()}
function cpTag(tag,btn,e){e.stopPropagation();e.preventDefault();navigator.clipboard.writeText(tag).then(()=>{btn.className='cpb ok';btn.textContent='✓';setTimeout(()=>{btn.className='cpb';btn.textContent='⧉'},1000)})}

function rP(){
  const a=document.getElementById('pinA');
  if(!pins.size){a.innerHTML='';return}
  let h='<div style="background:'+T.pinBg+';border:1px solid '+T.pinBorder+';border-radius:8px;padding:10px 12px;margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:9px;letter-spacing:2px;color:'+T.pinLabel+';text-transform:uppercase">📌 Pinned ('+pins.size+')</span><button onclick="clP()" style="font-size:9px;padding:2px 8px;font-family:inherit;background:none;border:1px solid #3a3a5a;border-radius:4px;color:#8888a0;cursor:pointer">Clear All</button></div><div style="display:flex;flex-wrap:wrap;gap:4px">';
  pins.forEach(t=>{h+='<span style="font-size:10px;padding:3px 8px;background:'+T.pinTag+';border:1px solid '+T.pinTagBorder+';border-radius:4px;color:'+T.pinTagTxt+';cursor:pointer;white-space:nowrap;-webkit-user-select:none;user-select:none" onclick="tP(\''+t.replace(/'/g,"\\'")+'\')">'+t+' ×</span>'});
  h+='</div></div>';a.innerHTML=h;
}

function rPG(){
  document.getElementById('pT').textContent='Tag Pool ('+cT()+')';
  const g=document.getElementById('pG');g.innerHTML='';
  Object.entries(P).forEach(([k,v])=>{
    if(!Array.isArray(v))return;
    const isO=oP===k,isDis=dis.has(k),isGen=k==="gender";
    const wrap=document.createElement('div');
    wrap.style.cssText='margin-bottom:'+(isO?'0':'5')+'px;opacity:'+(isDis?'0.4':'1')+';transition:opacity .2s';
    const hdr=document.createElement('div');
    hdr.style.cssText='display:flex;align-items:center;background:'+(isO?T.catOpen:T.catClosed)+';border-radius:'+(isO?'5px 5px 0 0':'5px')+';border:1px solid '+(isO?T.catBorderOpen:T.catBorderClosed)+(isO?';border-bottom:none':'')+';transition:all .15s';
    if(!isGen){
      const db=document.createElement('button');
      db.style.cssText='padding:4px 8px;font-size:12px;background:none;border:none;cursor:pointer;font-family:inherit;line-height:1;transition:color .15s;color:'+(isDis?T.disOn:T.disOff);
      db.textContent=isDis?'⊕':'⊖';db.title=isDis?'Enable':'Disable';
      db.onclick=e=>{e.stopPropagation();tD(k)};hdr.appendChild(db);
    }
    const lbl=document.createElement('div');
    lbl.style.cssText='flex:1;display:flex;justify-content:space-between;padding:'+(isGen?'6px 9px':'6px 9px 6px 0')+';cursor:pointer;-webkit-user-select:none;user-select:none;font-size:10px';
    lbl.innerHTML='<span style="color:'+(isO?T.txt:T.dim)+';text-decoration:'+(isDis?'line-through':'none')+'">'+k+'</span><span style="color:'+T.dimmer+'">'+v.length+'</span>';
    lbl.onclick=()=>{oP=oP===k?null:k;rPG()};hdr.appendChild(lbl);wrap.appendChild(hdr);
    if(isO){
      const box=document.createElement('div');
      box.style.cssText='background:'+T.panelBg+';border:1px solid '+T.panelBorder+';border-top:none;border-radius:0 0 8px 8px;padding:12px 14px;margin-bottom:5px;position:relative';
      let h='<button onclick="oP=null;rPG()" style="position:absolute;top:8px;right:10px;background:none;border:none;color:'+T.dim+';font-size:16px;cursor:pointer;font-family:inherit;line-height:1;padding:2px 6px;border-radius:4px">×</button>';
      h+='<div style="font-size:10px;letter-spacing:2px;color:'+T.dimmer+';text-transform:uppercase;margin-bottom:8px">'+k+' ('+v.length+')</div><div style="display:flex;flex-wrap:wrap;gap:4px">';
      v.forEach(item=>{
        const tag=Array.isArray(item)?item[0]:item;const isP=pins.has(tag);const esc=tag.replace(/'/g,"\\'");
        h+=`<span style="display:inline-flex;align-items:center;font-size:10px;padding:3px 6px 3px 8px;background:${isP?T.tagPinBg:T.tagBg};border:1px solid ${isP?T.tagPinBorder:T.tagBorder};border-radius:4px;color:${isP?T.tagPinTxt:T.tagTxt};white-space:nowrap;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none" onclick="tP('${esc}')">${isP?'📌 ':''}${tag}<button class="cpb" onmousedown="event.stopPropagation()" onclick="cpTag('${esc}',this,event)">⧉</button></span>`;
      });
      h+='</div>';box.innerHTML=h;wrap.appendChild(box);
    }
    g.appendChild(wrap);
  });
}

// ═══ GENERIC EXTRA SECTION RENDERER ═══
function rExtra(elId,data,isOpen,openCat,title,toggleOpenFn,toggleCatFn){
  const a=document.getElementById(elId);
  let h='<div style="margin-bottom:16px">';
  h+='<div onclick="'+toggleOpenFn+'" style="font-size:10px;letter-spacing:2px;color:'+T.dimmer+';text-transform:uppercase;cursor:pointer;-webkit-user-select:none;user-select:none;margin-bottom:8px">';
  h+=(isOpen?'▼':'▶')+' '+title+'</div>';
  if(isOpen){
    Object.entries(data).forEach(([k,v])=>{
      const isO=openCat===k;
      h+='<div style="margin-bottom:'+(isO?'0':'5')+'px">';
      h+='<div onclick="'+toggleCatFn+'(\''+k+'\')" style="font-size:10px;padding:6px 9px;background:'+(isO?T.exCatOpen:T.exCatClosed)+';border-radius:'+(isO?'5px 5px 0 0':'5px')+';border:1px solid '+(isO?T.exCatBorderOpen:T.exCatBorder)+(isO?';border-bottom:none':'')+';display:flex;justify-content:space-between;cursor:pointer;opacity:0.7;-webkit-user-select:none;user-select:none">';
      h+='<span style="color:'+(isO?T.txt:T.dimmer)+'">'+k+'</span><span style="color:'+(isO?'#8a8a9e':'#4a4a5e')+'">'+v.length+'</span></div>';
      if(isO){
        h+='<div style="background:'+T.panelBg+';border:1px solid '+T.panelBorder+';border-top:none;border-radius:0 0 8px 8px;padding:12px 14px;margin-bottom:5px;position:relative">';
        h+='<button onclick="'+toggleCatFn+'(null)" style="position:absolute;top:8px;right:10px;background:none;border:none;color:'+T.dimmer+';font-size:16px;cursor:pointer;font-family:inherit;line-height:1;padding:2px 6px;border-radius:4px">×</button>';
        h+='<div style="font-size:10px;letter-spacing:2px;color:'+T.dimmer+';text-transform:uppercase;margin-bottom:8px">'+k+' ('+v.length+')</div><div style="display:flex;flex-wrap:wrap;gap:4px">';
        v.forEach(tag=>{
          const isP=pins.has(tag);const esc=tag.replace(/'/g,"\\'");
          h+=`<span style="display:inline-flex;align-items:center;font-size:10px;padding:3px 6px 3px 8px;background:${isP?T.tagPinBg:T.exTagBg};border:1px solid ${isP?T.tagPinBorder:T.exTagBorder};border-radius:4px;color:${isP?T.tagPinTxt:T.exTagTxt};white-space:nowrap;cursor:pointer;opacity:${isP?'1':'0.8'};-webkit-user-select:none;user-select:none" onclick="tP('${esc}')">${isP?'📌 ':''}${tag}<button class="cpb" onmousedown="event.stopPropagation()" onclick="cpTag('${esc}',this,event)">⧉</button></span>`;
        });
        h+='</div></div>';
      }
      h+='</div>';
    });
  }
  h+='</div>';a.innerHTML=h;
}

// Toggle wrappers
function tExprOp(){exprOp=!exprOp;rAllExtra()}
function tExprK(k){exprK=exprK===k?null:k;rAllExtra()}
function tExclOp(){exclOp=!exclOp;rAllExtra()}
function tExclK(k){exclK=exclK===k?null:k;rAllExtra()}

function rAllExtra(){
  rExtra('exprA',EXPR,exprOp,exprK,'Expression ('+cO(EXPR)+')','tExprOp()','tExprK');
  rExtra('exclA',EX,exclOp,exclK,'Excluded Tags ('+cO(EX)+')','tExclOp()','tExclK');
}

function rH(){
  const s=document.getElementById('hS'),l=document.getElementById('hL');
  if(hist.length<=1){s.style.display='none';return}
  s.style.display='block';document.getElementById('hT').textContent='History ('+(hist.length-1)+')';
  l.innerHTML='';
  hist.slice(1,15).forEach((it,i)=>{const d=document.createElement('div');d.style.cssText='background:'+T.histBg+';border:1px solid '+T.histBorder+';border-radius:7px;padding:10px 12px;font-size:10.5px;color:'+T.dim+';line-height:1.55;word-break:break-word;position:relative;cursor:pointer;transition:border-color .15s;margin-bottom:6px';d.innerHTML='<span style="position:absolute;top:8px;right:10px;font-size:9px;color:'+T.histBorder+';transition:color .15s" id="hc'+i+'">copy</span>'+(it.t.length>220?it.t.slice(0,220)+'…':it.t);d.onmouseenter=function(){this.style.borderColor=T.dim};d.onmouseleave=function(){this.style.borderColor=T.histBorder};d.onclick=()=>{navigator.clipboard.writeText(it.t).then(()=>{const sp=document.getElementById('hc'+i);sp.style.color=T.copyOkTxt;sp.textContent='✓';setTimeout(()=>{sp.style.color=T.histBorder;sp.textContent='copy'},1400)})};l.appendChild(d)});
}

// Theme
let isDark=true;
const DARK={bg:'#1a1a24',card:'#222230',border:'#303044',accent:'#3a3a58',txt:'#e0ddd6',dim:'#8888a0',dimmer:'#606078',gridLine:'rgba(200,200,255,.025)',titleA:'#e8e4d8',titleB:'#a09888',pinBg:'#252538',pinBorder:'#35354a',pinLabel:'#8888b0',pinTag:'#2a2a4e',pinTagBorder:'#6a6aaa',pinTagTxt:'#b0b0ff',catOpen:'#2e2e44',catClosed:'#1e1e2a',catBorderOpen:'#3a3a5a',catBorderClosed:'#3a3a4e',tagBg:'#282842',tagBorder:'#2e2e4a',tagTxt:'#c0bec8',tagPinBg:'#2a2a4e',tagPinBorder:'#6a6aaa',tagPinTxt:'#b0b0ff',panelBg:'#252535',panelBorder:'#353548',exCatClosed:'#1a1a24',exCatBorder:'#2a2a3a',exCatOpen:'#252535',exCatBorderOpen:'#353548',exTagBg:'#1e1e2e',exTagBorder:'#2a2a3e',exTagTxt:'#808098',histBg:'#1e1e2a',histBorder:'#3a3a4e',copyOkBg:'#1e2e1e',copyOkBorder:'#3a5a3a',copyOkTxt:'#7ab07a',copyBg:'#282832',disOff:'#606078',disOn:'#ff6a6a'};
const LIGHT={bg:'#f0efe8',card:'#ffffff',border:'#d8d6ce',accent:'#e8e6de',txt:'#2a2a30',dim:'#6a6a78',dimmer:'#9a98a0',gridLine:'rgba(0,0,0,.03)',titleA:'#3a3a48',titleB:'#6a6878',pinBg:'#eae8e0',pinBorder:'#d0cec6',pinLabel:'#6a6a80',pinTag:'#ddd8f0',pinTagBorder:'#a0a0d0',pinTagTxt:'#5050a0',catOpen:'#e8e6de',catClosed:'#f5f4ee',catBorderOpen:'#c8c6be',catBorderClosed:'#d8d6ce',tagBg:'#f0efe8',tagBorder:'#d8d6ce',tagTxt:'#3a3a48',tagPinBg:'#ddd8f0',tagPinBorder:'#a0a0d0',tagPinTxt:'#5050a0',panelBg:'#f8f7f2',panelBorder:'#d8d6ce',exCatClosed:'#f5f4ee',exCatBorder:'#d8d6ce',exCatOpen:'#f0efe8',exCatBorderOpen:'#c8c6be',exTagBg:'#f0efe8',exTagBorder:'#d0cec6',exTagTxt:'#6a6a78',histBg:'#f5f4ee',histBorder:'#d8d6ce',copyOkBg:'#e0f0e0',copyOkBorder:'#90c090',copyOkTxt:'#308030',copyBg:'#f0efe8',disOff:'#9a98a0',disOn:'#d04040'};
let T=DARK;
function applyTheme(){
  const r=document.documentElement.style;
  Object.entries(T).forEach(([k,v])=>r.setProperty('--'+k,v));
  document.getElementById('thBtn').textContent=isDark?'☀️':'🌙';
  rPG();rAllExtra();rP();rH();
}
function toggleTheme(){isDark=!isDark;T=isDark?DARK:LIGHT;applyTheme()}
applyTheme();
sG('random');rPG();rAllExtra();gen();
</script>
